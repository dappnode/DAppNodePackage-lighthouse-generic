version: "3.5"
services:
  beacon-chain:
    build:
      context: beacon-chain
      args:
        NETWORK: gnosis 
        P2P_PORT: 19004
    ports:
      - "19004:19004"
      - "19004:19004/udp"
    environment:
      CORSDOMAIN: "http://lighthouse-gnosis.dappnode"
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync-gnosis.dappnode.net"
  validator:
    build:
      args:
        NETWORK: gnosis
